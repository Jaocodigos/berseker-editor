version: "3.9"
services:
    mysql:
        image: mysql:8.0
        container_name: rpg-mysql
        environment:
            MYSQL_ROOT_PASSWORD: secret
            MYSQL_DATABASE: rpg_db
            TZ: America/Sao_Paulo
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        command: ["--default-authentication-plugin=mysql_native_password"]
volumes:
    mysql_data: